<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result - Wine Quality AI</title>
    <meta name="description" content="View the predicted wine quality score.">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Three.js for 3D Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #080305;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        .glass-card {
            background: rgba(30, 10, 15, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 75, 107, 0.2);
            border-radius: 24px;
            padding: 4rem 3rem;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeIn {
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff 0%, #ffb6c1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        
        p.subtitle {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .prediction-score {
            font-size: 6rem;
            font-weight: 800;
            margin: 1.5rem 0 2.5rem 0;
            background: linear-gradient(135deg, #ff7b93 0%, #ff2a55 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 40px rgba(255, 42, 85, 0.4);
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-btn:hover {
            border-color: rgba(255, 75, 107, 0.6);
            background: rgba(255, 42, 85, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 42, 85, 0.2);
        }

        .back-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="container">
        <div class="glass-card">
            <h1>Analysis Complete</h1>
            <p class="subtitle">The predicted quality score for this wine is</p>
            
            <div class="prediction-score">
                {{ prediction }}
            </div>
            
            <a href="/" class="back-btn">Analyze Another Wine</a>
        </div>
    </div>

    <!-- 3D Animation Script (Consistent with index.html) -->
    <script>
        const container = document.getElementById('canvas-container');
        
        // Scene setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x080305, 0.15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Create abstract wine fluid/particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1500;
        
        const posArray = new Float32Array(particlesCount * 3);
        const scaleArray = new Float32Array(particlesCount);
        
        for(let i = 0; i < particlesCount * 3; i+=3) {
            posArray[i] = (Math.random() - 0.5) * 15;
            posArray[i+1] = (Math.random() - 0.5) * 15;
            posArray[i+2] = (Math.random() - 0.5) * 10;
            scaleArray[i/3] = Math.random();
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('aScale', new THREE.BufferAttribute(scaleArray, 1));
        
        // Custom shader material for glowing dots
        const material = new THREE.PointsMaterial({
            size: 0.05,
            color: 0xff2a55,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh);

        // Add a secondary ambient mesh
        const geometry = new THREE.IcosahedronGeometry(3, 1);
        const wireframeMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xff7b93, 
            wireframe: true,
            transparent: true,
            opacity: 0.05
        });
        const sphere = new THREE.Mesh(geometry, wireframeMaterial);
        scene.add(sphere);

        // Mouse interaction
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        const clock = new THREE.Clock();

        // Animation loop
        const animate = () => {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            
            // Gentle continuous rotation
            particlesMesh.rotation.y += 0.0005;
            particlesMesh.rotation.x += 0.0002;
            
            sphere.rotation.y -= 0.001;
            sphere.rotation.x += 0.0005;

            // Parallax effect following mouse
            particlesMesh.rotation.y += 0.05 * (targetX - particlesMesh.rotation.y);
            particlesMesh.rotation.x += 0.05 * (targetY - particlesMesh.rotation.x);
            
            // Float effect for particles
            particlesMesh.position.y = Math.sin(elapsedTime * 0.5) * 0.2;

            renderer.render(scene, camera);
        }
        
        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
